<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart | KickCulture 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/site.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">KickCulture 2026</a>
      <button class="menu-toggle" type="button" aria-label="Open menu">Menu</button>
      <nav class="nav">
        <button class="menu-close" type="button" aria-label="Close menu">X</button>
        <a href="shop.html">Shop All</a>
        <a href="club-jerseys.html">Club Jerseys</a>
        <a href="delivery.html">Delivery</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>
    <main class="page">
      <section class="section-head">
        <h1>Your Cart</h1>
      </section>
      <section id="cartRows" class="cart-list"></section>
      <section class="cart-summary">
        <p>Total items: <span id="cartCount">0</span></p>
        <p>Total amount: <span id="cartTotal">$0</span></p>
        <div class="checkout-fields">
          <label class="field">
            <span>Name</span>
            <input id="nameInput" type="text" placeholder="Full name" />
          </label>
          <label class="field">
            <span>Phone Number</span>
            <input id="phoneInput" type="tel" placeholder="Phone with country code" />
          </label>
          <label class="field">
            <span>Country</span>
            <input id="countryInput" type="text" placeholder="Country" />
          </label>
          <label class="field">
            <span>Full Address</span>
            <textarea id="addressInput" rows="3" placeholder="Street, city, state"></textarea>
          </label>
          <label class="field">
            <span>Postcode</span>
            <input id="postcodeInput" type="text" placeholder="Postcode / ZIP" />
          </label>
        </div>
        <button id="checkoutWhatsApp" class="btn btn-solid pulse" type="button">Checkout on WhatsApp</button>
      </section>
    </main>
    <footer class="site-footer">
      <p>Worldwide shipping available in 5-7 business days</p>
    </footer>
    <script src="assets/store.js"></script>
    <script src="assets/cart.js"></script>
    <script src="assets/nav.js"></script>
  </body>
</html>
